<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>لا يوجد اتصال — أسس الإعمار</title>
    <style>
      body {
        margin: 0;
        min-height: 100svh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: "Cairo", system-ui, sans-serif;
        background: #f8fafc;
        color: #0f172a;
        text-align: center;
        padding: 1.5rem;
      }
      .card { max-width: 26rem; }
      h1 { font-size: 1.35rem; margin: 0 0 0.5rem; }
      p { color: #475569; margin: 0 0 1.25rem; line-height: 1.7; }
      button {
        font: inherit;
        background: #0f172a;
        color: #fff;
        border: 0;
        border-radius: 0.6rem;
        padding: 0.6rem 1.6rem;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>لا يوجد اتصال بالإنترنت</h1>
      <p>
        تعذّر الوصول إلى نظام إدارة المكتب. بيانات النظام لا تُحفظ على الجهاز حفاظاً على
        سرّيتها — أعد المحاولة عند عودة الاتصال.
      </p>
      <button onclick="location.reload()">إعادة المحاولة</button>
    </div>
  </body>
</html>
